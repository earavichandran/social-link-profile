<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Frontend Mentor | Social links profile</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="image_card">
        <div class="image">
          <img src="images/avatar-jessica.jpeg" alt="Jessica" />
        </div>
        <div class="profile">
          <h1>Jessica Randall</h1>
          <p class="place">London, United Kingdom</p>
          <p class="quote">"Front-end developer and avid reader."</p>
        </div>
      </section>
      <section class="social_links">
        <div class="btn_social">
          <button type="submit" class="btn">GitHub</button>
          <button type="submit" class="btn">Frontend Mentor</button>
          <button type="submit" class="btn">LinkedIn</button>
          <button type="submit" class="btn">Twitter</button>
          <button type="submit" class="btn">Instagram</button>
        </div>
      </section>
    </main>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by
      <a href="https://github.com/earavichandran/social-link-profile"
        >@earavichandran</a
      >.
    </footer>
  </body>
</html>
