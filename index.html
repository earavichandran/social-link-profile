<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Frontend Mentor | Social links profile</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <main class="container">
      <div class="image">
        <img src="images/avatar-jessica.jpeg" alt="Jessica" />
      </div>
      <div class="profile">
        <h1 class="name">Jessica Randall</h1>
        <p class="place">London, United Kingdom</p>
      </div>
      <div class="role">
        <p>"Front-end developer and avid reader."</p>
      </div>
      <nav class="btn_social" role="navigation" aria-label="Social Links">
        <a href="https://github.com" class="btn">GitHub</a>
        <a href="https://www.frontendmentor.io" class="btn">Frontend Mentor</a>
        <a href="https://in.linkedin.com/" class="btn">LinkedIn</a>
        <a href="https://x.com" class="btn">Twitter</a>
        <a href="https://www.instagram.com" class="btn">Instagram</a>
      </nav>
    </main>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by
      <a href="https://github.com/earavichandran/social-link-profile"
        >@earavichandran</a
      >.
    </footer>
  </body>
</html>
